version: '3.8'

services:
  # --- Application Services ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itsm-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8080}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - itsm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itsm-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-itsm_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-itsm_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-itsmpassword}
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - itsm-network

  # --- Infrastructure Services ---
  mariadb:
    image: mariadb:10.11
    container_name: itsm-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - itsm-network

  postgres:
    image: postgres:15-alpine
    container_name: itsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itsm-network

  prometheus:
    image: prom/prometheus:latest
    container_name: itsm-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - itsm-network

  grafana:
    image: grafana/grafana:latest
    container_name: itsm-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - itsm-network

volumes:
  mariadb_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  itsm-network:
    driver: bridge
